query AudiobookResultsQuery($id: String!) {
  audiobookById(id: $id) {
    ...AudiobookScreenFragment
    __typename
  }
  audiobookExternalPurchaseLink(audiobookId: $id) {
    url
    __typename
  }
}
fragment AudiobookScreenFragment on Audiobook {
  id
  title
  authorNames
  authors {
    name
    __typename
  }
  narrators {
    name
    __typename
  }
  accessLevel
  accessLevels
  description
  yearOfBookPublication
  publisherName
  duration
  streamMeta {
    isAvailableForStreaming
    availableForStreamingFrom
    __typename
  }
  ...AudiobookCoverImageFragment
  ...AudiobookLanguageFragment
  ...AudioBookUserStateFragment
  __typename
}
fragment AudiobookCoverImageFragment on Audiobook {
  coverImage {
    url
    mainColor
    __typename
  }
  __typename
}
fragment AudiobookLanguageFragment on Audiobook {
  language {
    isoLanguage
    localisedLanguage
    __typename
  }
  __typename
}
fragment AudioBookUserStateFragment on Audiobook {
  userState {
    isAddedToLibrary
    isMarkedAsPlayed
    ...AudiobookUserProgressFragment
    __typename
  }
  __typename
}
fragment AudiobookUserProgressFragment on AudiobookUserState {
  userProgress {
    progress
    listenTime
    lastListenDatetime
    __typename
  }
  __typename
}
